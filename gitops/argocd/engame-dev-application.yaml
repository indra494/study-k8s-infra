apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: engame-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/indra494/study-k8s-infra.git
    targetRevision: main
    path: gitops/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: engame-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
